# USB Relay Controller (STM32 Virtual ComPort)
RELAY_PORT=/dev/ttyACM0

# VMK180 APU UART Console (Xilinx FT4232H interface 2)
# The VMK180 has 4 UART ports from the FT4232H:
#   ttyUSB4 (if00): JTAG/Debug
#   ttyUSB5 (if01): PMC/System Controller UART
#   ttyUSB6 (if02): APU UART (main Linux/wolfBoot console)
#   ttyUSB7 (if03): RPU UART
UART_PORT=/dev/ttyUSB6

# UART baud rate (standard for VMK180)
UART_BAUD=115200

# Path to relays.py script
RELAYS_SCRIPT=/home/davidgarske/relays.py

